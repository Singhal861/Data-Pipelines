version: 2

sources:
  - name: bronze
    database: singhal
    schema: fifa_worldcup_bronze
    description: >
      Bronze layer tables containing raw World Cup 2026 data.
      Ingested and maintained upstream by Python notebooks.
    
    tables:
      - name: players
        description: Raw player roster data with cumulative stats
        
      - name: teams
        description: Raw team information and group assignments
        
      - name: matches
        description: Raw match results with scores and goal events
        
      - name: goal_events
        description: |
          Individual goal events extracted from matches with preserved timestamps.
          Includes player name, goal time (with injury time like '90+3'), team info, and match context.
          Replaces manual parsing of home_scorers/away_scorers strings from matches table.
        
      - name: group_standings
        description: Raw group stage standings with points and rankings
        
      - name: knockout_bracket
        description: Raw knockout tournament bracket structure
        
      - name: stadiums
        description: Raw venue and stadium information

  - name: silver
    database: singhal
    schema: fifa_worldcup_silver
    description: >
      Silver layer reference tables that are NOT managed by dbt.
      These are one-time static tables created manually via notebooks.
    
    tables:
      - name: ref_stadium_enriched
        description: |
          Static reference table for stadium timezone and country mapping.
          Created manually in notebook (one-time table, not managed by dbt).
          Used for UTC conversion in gold layer.
