version: 2

models:
  - name: silver_player_stats_history
    description: >
      Player stats progression over time (SCD Type 2).
      Tracks goals, assists, and ratings throughout tournament.
      Only inserts new snapshots when stats actually change.
    
    tests:
      - dbt_utils.expression_is_true:
          expression: "(SELECT COUNT(DISTINCT player_id) FROM {{ ref('silver_player_stats_history') }}) > 0"
          config:
            severity: error
            
    columns:
      - name: player_id
        description: Player identifier (links to silver_players)
        tests:
          - not_null:
              config:
                severity: error
          - relationships:
              to: ref('silver_players')
              field: player_id
              config:
                severity: error
                
      - name: goals_scored
        description: Cumulative goals scored (from API)
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 20
              inclusive: true
              config:
                severity: warn